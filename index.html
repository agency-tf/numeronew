<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorti365 - Pronósticos y Juegos</title>
    <!-- Tailwind CSS para maquetación rápida -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #060e0a;
            overflow-x: hidden;
        }
        /* Efecto de Luces de Estadio y Atmósfera de Fútbol */
        .stadium-glow {
            background: 
                radial-gradient(circle at 50% 10%, rgba(34, 197, 94, 0.25) 0%, transparent 60%),
                radial-gradient(circle at 50% 90%, rgba(22, 163, 74, 0.15) 0%, transparent 50%),
                linear-gradient(to bottom, #040a07, #0b1c12, #040a07);
        }
        /* Tipografía estilo Copa Mundial */
        .world-cup-title {
            text-shadow: 0 4px 12px rgba(249, 115, 22, 0.5), 0 2px 4px rgba(0, 0, 0, 0.8);
        }
        /* Botón con brillo neon verde */
        .btn-neon-glow {
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        /* Animación de pulso suave */
        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 0 30px rgba(34, 197, 94, 0.7); }
        }
        .animate-pulse-glow {
            animation: pulse-glow 2s infinite ease-in-out;
        }
        /* Checkbox modificado */
        .custom-checkbox:checked {
            background-color: #10b981;
            border-color: #10b981;
        }
    </style>
</head>
<body class="stadium-glow text-white min-h-screen flex flex-col justify-between relative selection:bg-emerald-500 selection:text-black">

    <!-- CANVAS PARA PARTÍCULAS FLOTANTES DE ESTADIO -->
    <canvas id="particles-canvas" class="absolute inset-0 pointer-events-none z-0"></canvas>

    <!-- CONTENEDOR PRINCIPAL -->
    <main class="flex-grow flex items-center justify-center p-4 relative z-10">
        
        <div class="w-full max-w-md text-center flex flex-col items-center">
            
            <!-- Logo Superior (Estilo Sorti365) -->
            <div class="mb-10 flex items-center gap-2 justify-center bg-black/40 backdrop-blur-md py-2 px-5 rounded-full border border-emerald-500/10 shadow-[0_0_15px_rgba(34,197,94,0.1)]">
                <span class="text-emerald-500 animate-spin" style="animation-duration: 12s;">
                    <!-- Trébol / Estrella Verde de Sorti365 SVG -->
                    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2a3 3 0 0 0-3 3c0 1.14.64 2.13 1.58 2.63A4 4 0 0 0 7 11c0 1.14.64 2.13 1.58 2.63A3 3 0 1 0 12 22a3 3 0 0 0 3-3c0-1.14-.64-2.13-1.58-2.63A4 4 0 0 0 17 13c0-1.14-.64-2.13-1.58-2.63A3 3 0 0 0 12 2zm0 14a2 2 0 1 1 0 4 2 2 0 0 1 0-4zm-4-4a2 2 0 1 1 0 4 2 2 0 0 1 0-4zm8 0a2 2 0 1 1 0 4 2 2 0 0 1 0-4zm-4-4a2 2 0 1 1 0 4 2 2 0 0 1 0-4z"/>
                    </svg>
                </span>
                <div>
                    <span id="view-brand-name" class="font-black text-lg tracking-tight text-white uppercase">SEPY<span class="text-emerald-500">BET</span></span>
                    <span class="block text-[8px] tracking-widest text-emerald-400/80 font-bold uppercase -mt-1">Atención Oficial</span>
                </div>
            </div>

            <!-- TÍTULOS CENTRALES -->
            <div class="mb-10 px-4 relative">
                <!-- Luces de reflectores simuladas en el fondo del texto -->
                <div class="absolute w-72 h-32 bg-emerald-500/15 rounded-full blur-3xl -translate-y-12 left-1/2 -translate-x-1/2 pointer-events-none"></div>

                <span id="view-brand-subtitle" class="block text-sm font-bold uppercase tracking-[0.25em] text-emerald-400 mb-2">Aviso Importante</span>
                
                <h1 id="view-main-title" class="text-4xl md:text-5xl font-extrabold tracking-tighter text-white uppercase leading-none drop-shadow-lg mb-2">
                    NUEVO
                </h1>
                <h1 id="view-accent-title" class="world-cup-title text-5xl md:text-6xl font-extrabold tracking-tighter text-emerald-500 uppercase leading-none drop-shadow-xl italic">
                    NÚMERO
                </h1>
            </div>

            <!-- ENTRADA TIPO CHECKBOX -->
            <div class="w-full px-4 mb-8 text-left">
                <div class="flex items-center justify-between mb-2 pl-1">
                    <label class="block text-[13px] font-bold uppercase tracking-widest text-emerald-400">Paso Único</label>
                </div>
                
                <!-- Recuadro para marcar -->
                <label class="relative flex items-start gap-4 cursor-pointer bg-black/75 border-2 border-emerald-500/20 hover:border-emerald-500/40 rounded-2xl p-4 transition-all backdrop-blur-md group">
                    <div class="flex items-center h-6">
                        <input type="checkbox" id="terms-checkbox" onchange="updateButtonState()" class="custom-checkbox w-6 h-6 border-2 border-slate-500 rounded-md appearance-none checked:bg-emerald-500 checked:border-transparent outline-none transition-all cursor-pointer flex items-center justify-center">
                        <i id="check-icon" class="fas fa-check absolute text-white text-sm hidden pointer-events-none" style="left: 1.3rem;"></i>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-base font-bold text-white leading-tight">Ir al nuevo WhatsApp</span>
                        <span class="text-[12px] text-slate-400 mt-1">Marca este cuadro para ser redirigido automáticamente al nuevo número de atención.</span>
                    </div>
                </label>
            </div>

            <!-- BOTÓN ÚNICO DE ALTA CONVERSIÓN -->
            <div class="w-full px-4 mb-6">
                <a id="btn-main-action" href="#" target="_top" class="flex flex-col items-center justify-center w-full py-5 px-6 rounded-2xl transition-all duration-200">
                    <span id="view-btn-text" class="text-xl font-black uppercase tracking-wider">🟢 ESPERANDO CONFIRMACIÓN</span>
                    <span id="view-btn-subtext" class="text-xs font-semibold mt-1">Por favor, marca el recuadro arriba</span>
                </a>
            </div>

            <!-- Sello de Juego Responsable -->
            <p id="view-disclaimer" class="text-[9px] text-emerald-500/60 uppercase tracking-widest font-semibold">
                Soporte Oficial | Sepybet 2026
            </p>

        </div>
    </main>

    <!-- Footer de la marca -->
    <footer class="py-4 text-center text-[10px] text-emerald-500/30 font-semibold uppercase tracking-widest relative z-10 bg-black/25">
        &copy; Sepybet - Nuevo Canal de Atención
    </footer>

    <!-- Notificaciones Flotantes -->
    <div id="toast" class="fixed bottom-6 right-6 transform translate-y-20 opacity-0 bg-emerald-500 text-slate-950 px-5 py-3 rounded-2xl shadow-xl flex items-center gap-3 transition-all duration-300 z-50 text-sm font-bold pointer-events-none">
        <span id="toast-msg">¡Listo!</span>
    </div>

    <!-- SCRIPT DE EFECTOS VISUALES Y CONTROL DE REDIRECCIÓN -->
    <script>
        const config = {
            phone: "593939161656",
            btnText: "🟢 REDIRIGIENDO...",
            btnSubtext: "Abriendo WhatsApp en un instante",
            msgTemplate: "" // Se ha removido el mensaje predefinido
        };

        // Se ejecuta cada vez que el usuario interactúa con el checkbox
        function updateButtonState() {
            const checkbox = document.getElementById('terms-checkbox');
            const checkIcon = document.getElementById('check-icon');
            const btn = document.getElementById('btn-main-action');
            const btnText = document.getElementById('view-btn-text');
            const btnSubtext = document.getElementById('view-btn-subtext');

            if (!checkbox.checked) {
                // Estado bloqueado
                checkIcon.classList.add('hidden');
                btn.href = "#";
                btn.onclick = function(e) {
                    e.preventDefault();
                    showToast("Por favor, marca el recuadro para continuar.");
                };
                
                // Clases visuales apagadas
                btn.className = "flex flex-col items-center justify-center w-full py-5 px-6 bg-slate-800 text-slate-500 rounded-2xl border-2 border-slate-700/50 cursor-not-allowed opacity-60 transition-all duration-200";
                btnText.innerText = "🟢 ESPERANDO CONFIRMACIÓN";
                btnSubtext.innerText = "Por favor, marca el recuadro arriba";
                btnSubtext.className = "text-xs text-red-400 font-semibold mt-1";
            } else {
                // Estado activado
                checkIcon.classList.remove('hidden');
                const finalWaUrl = `https://wa.me/${config.phone}?text=${encodeURIComponent(config.msgTemplate)}`;
                
                btn.href = finalWaUrl;
                btn.onclick = null;
                
                // Clases visuales encendidas (Neón verde)
                btn.className = "btn-neon-glow animate-pulse-glow flex flex-col items-center justify-center w-full py-5 px-6 bg-gradient-to-r from-emerald-500 to-green-600 hover:from-emerald-400 hover:to-green-500 active:scale-95 text-slate-950 rounded-2xl transition-all duration-200 cursor-pointer";
                btnText.innerText = config.btnText;
                btnSubtext.innerText = config.btnSubtext;
                btnSubtext.className = "text-xs text-slate-950/75 font-semibold mt-1";
                
                // Redirección automática instantánea tras 800ms
                setTimeout(() => { window.location.href = finalWaUrl; }, 800);
            }
        }

        // Sistema de notificaciones
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');

            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // Inicialización
        window.addEventListener('DOMContentLoaded', () => {
            updateButtonState(); // Setea el botón como apagado al entrar
            initParticles();
            animateParticles();
        });

        // ================= SISTEMA DE PARTÍCULAS INTERACTIVO =================
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height + canvas.height;
                this.size = Math.random() * 3 + 0.5;
                this.speedY = -(Math.random() * 0.8 + 0.2);
                this.speedX = Math.random() * 0.4 - 0.2;
                this.opacity = Math.random() * 0.5 + 0.1;
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y < -10) {
                    this.y = canvas.height + 10;
                    this.x = Math.random() * canvas.width;
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = '#22c55e';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#22c55e';
                ctx.fill();
                ctx.restore();
            }
        }

        function initParticles() {
            particlesArray = [];
            const numberOfParticles = Math.min(60, Math.floor(window.innerWidth / 15));
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }
    </script>
</body>
</html>
